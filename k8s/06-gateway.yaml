apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ticketing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["api-gateway"]
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: api-gateway
          image: __REGISTRY__/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: RESERVAS_URL
              value: "http://reservas-service:8000"
            - name: INVENTARIO_URL
              value: "http://inventario-service:8000"
            - name: HTTP_TIMEOUT
              value: "6"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ticketing
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
