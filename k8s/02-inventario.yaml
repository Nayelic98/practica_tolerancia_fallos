apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario-service
  namespace: ticketing
spec:
  replicas: 2
  strategy:
    # RollingUpdate no puede funcionar con podAntiAffinity "required" en
    # exactamente 2 nodos: cualquier actualización necesita un 3er slot
    # transitorio para tener la réplica vieja y la nueva coexistiendo, que no
    # existe. Recreate evita el deadlock de programación de raíz, a cambio de
    # un instante de downtime total del servicio durante cada actualización.
    type: Recreate
  selector:
    matchLabels:
      app: inventario-service
  template:
    metadata:
      labels:
        app: inventario-service
    spec:
      # Fuerza a que las 2 réplicas caigan en nodos (físicos) distintos.
      # Con exactamente 2 nodos en el clúster, esto garantiza 1 réplica por nodo.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: ["inventario-service"]
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: inventario-service
          image: __REGISTRY__/inventario-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: inventario-service
  namespace: ticketing
spec:
  selector:
    app: inventario-service
  ports:
    - port: 8000
      targetPort: 8000
